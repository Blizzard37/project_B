name: Resusale workflow
on: 
  workflow_call:
    inputs:
      artifact-name:
        description: The name of the deployable artifcat files 
        required: true
        default: dist
        type: string

jobs:
  deploy:
    environment: test
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/download-artifact@v4
        with: 
          name: ${{inputs.artifact-name}}
      - name: List files
        run: ls
      - name: Deploy
        run: echo "Downloading and Deploying"
      - name: Display
        run: |
              echo "Informix user: $ {{secrets.DB_USER}} "
              echo "Informix password: $secrets.DB_PASSWORD"